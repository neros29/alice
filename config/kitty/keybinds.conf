# Keybindings 
map ctrl+shift+c         copy_to_clipboard
map ctrl+shift+v         paste_from_clipboard

# Font size quick adjust
map ctrl+equal           change_font_size all +1.0
map ctrl+minus           change_font_size all -1.0
map ctrl+0               change_font_size all 0

# --- Tab navigation using Ctrl+Alt+Number ---
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

map alt+h move_tab_backward
map alt+l move_tab_forward

# --- Tab management ---
map alt+enter new_tab
map alt+ctrl+enter new_tab_with_cwd
map alt+w close_tab

# --- Optional: cycle through tabs like Alt+Tab ---
map ctrl+alt+tab next_tab
map ctrl+alt+shift+tab previous_tab

# --- Session managing ---
# map ctrl+0 combine | close_session | goto_session ~/Templates/
map ctrl+0 goto_session ~/Templates/
map ctrl+f1 save_as_session --use-foreground-process --base-dir ~/Templates/

map shift+alt+enter new_window
