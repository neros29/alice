# Fonts
font_family JetBrains Mono
italic_font              auto
bold_italic_font         auto
font_size                10
disable_ligatures        never

# Window look & feel
background               #1e1e2e
foreground               #cdd6f4
cursor                   #f38ba8
cursor_text_color        #1e1e2e
selection_background     #45475a
selection_foreground     #cdd6f4

scrollback_lines         20000
window_padding_width     10
window_border_width      0
inactive_text_alpha      1.0
dynamic_background_opacity yes
background_opacity       0.94
hide_window_decorations  yes
confirm_os_window_close  0

# Performance / behavior
enable_audio_bell        yes
allow_remote_control     yes
detect_urls              yes
copy_on_select           no
strip_trailing_spaces    smart
shell_integration        enabled
tab_bar_style            powerline
tab_bar_min_tabs         1
tab_title_template       "{index}:{title[title.rfind('/')+1:]}"
active_tab_foreground    #11111b
active_tab_background    #83A8F7

inactive_tab_foreground  #cdd6f4
inactive_tab_background  #313244

# Color scheme – Catppuccin Mocha (tweaked)
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7
color6  #94e2d5
color7  #cdd6f4
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #ffffff

# Kitty graphics protocol: show images inline
# test:  kitty +kitten icat /path/to/image.png

#include the theme config
include /home/neros/.config/omarchy/current/theme/kitty.conf
# Cursor & caret
cursor_blink_interval    0.7
cursor_shape             beam

# Keybindings (Omarchy-friendly, vim-friendly splits/motion)
# Basics
map ctrl+shift+c         copy_to_clipboard
map ctrl+shift+v         paste_from_clipboard
map ctrl+shift+t         new_tab
map ctrl+shift+w         close_window
map ctrl+shift+n         new_os_window

# Font size quick adjust
map ctrl+equal           change_font_size all +1.0
map ctrl+minus           change_font_size all -1.0
map ctrl+0               change_font_size all 0

# Splits
map ctrl+shift+h         launch --location=split
map ctrl+shift+enter     launch --location=hsplit
map ctrl+shift+backspace close_window

# --- Tab navigation using Ctrl+Alt+Number ---
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

map alt+h move_tab_backward
map alt+l move_tab_forward

# --- Tab management ---
map alt+enter new_tab
map alt+w close_tab

# --- Optional: cycle through tabs like Alt+Tab ---
map ctrl+alt+tab next_tab
map ctrl+alt+shift+tab previous_tab

# Copy as plain text (no formatting)
map ctrl+shift+y         copy_to_clipboard_stripped

# Safe paste (shows a prompt for large pastes)
map ctrl+shift+s         paste_from_selection
# paste_actions            ask

# URL hints (open links with f)
# map f                    launch --allow-remote-control kitten hints --type=linenum
listen_on                unix:/tmp/kitty
shell_integration        enabled
# Wayland/scroll behavior
macos_option_as_alt      yes
mouse_hide_wait          2.0
