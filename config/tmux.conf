# --- GENERAL SETTINGS ---
setw -g mode-keys vi
set -g mouse on
set -g base-index 1
set -g renumber-windows on

# --- WINDOW NAVIGATION (Alt + Number) ---
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10

# --- WINDOW MANAGEMENT (Alt + Enter / Alt + w) ---
bind-key -n M-Enter new-window
bind-key -n M-w kill-window
# Stop tmux from automatically entering copy mode and copying on mouse drag
unbind -n MouseDrag1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- THE VIM-COPY "MODERN" WORKFLOW ---
# 1. Alt+c opens terminal history in Neovim
# 2. In Visual Mode, highlight text and press 'q' to copy to clipboard and close
# Add -c 'AnsiEsc' to the end of the nvim command
# capture-pane -e preserves the colors
bind-key -n M-c capture-pane -e -S -32768 \; \
  save-buffer /tmp/tmux-buffer \; \
  new-window -n "COPY" "nvim -c 'term cat /tmp/tmux-buffer' \
  -c 'set relativenumber number' \
  -c 'set laststatus=0' \
  -c 'normal G' \
  -c 'autocmd TextYankPost * if v:event.operator ==# \"y\" | call timer_start(0, {-> execute(\"q!\")}) | endif' \
  -c 'nnoremap q :q!<CR>'"

# --- TRADITIONAL COPY MODE (Fallback) ---
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# ============================================
# STATUS BAR COLORS & STYLE
# ============================================
set -g status-style bg=colour235,fg=colour147

# Pane border colors
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour117

# Message colors
set -g message-style bg=colour235,fg=colour117,bold

# ============================================
# STATUS BAR CONFIGURATION
# ============================================
set -g status on
set -g status-position bottom
set -g status-interval 1
set -g status-justify left

set -g status-left-length 50
set -g status-right-length 50

# ============================================
# POWERLINE FORMATTING
# ============================================

# Left side: Session Name in a solid block
set -g status-left "#[bg=colour117,fg=colour235,bold] #S #[bg=colour235,fg=colour117,nobold]"

# Window list format
# Inactive windows: Darker gray with a subtle divider
setw -g window-status-style fg=colour244,bg=colour235,none
setw -g window-status-format " #I:#W "

# Active window: The Powerline "arrow" effect
setw -g window-status-current-format "#[bg=colour238,fg=colour235]#[bg=colour238,fg=colour117,bold] #I:#W #[bg=colour235,fg=colour238,nobold]"

# Right side: Time/Date with a reverse arrow
set -g status-right "#[fg=colour238,bg=colour235]#[fg=colour244,bg=colour238] %H:%M #[default]"

# ============================================
# WINDOW & TERMINAL OPTIONS
# ============================================
setw -g automatic-rename on
setw -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Copy mode colors
setw -g mode-style bg=colour238,fg=colour117
