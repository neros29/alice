source = ~/.config/omarchy/current/theme/hyprlock.conf
# BACKGROUND
background {
    monitor =
    #    blur_size = 4
    #    blur_passes = 3
    path = ~/.config/omarchy/current/background
}

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $color
    font_size = 60
    font_family = Klee One
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
}

# TIME
label {
    monitor =
    # Use Pango markup <b> for true bolding
    text = <b>$TIME</b>
    color = $color
    font_size = 200
    font_family = Klee One
    position = 0, 0
    halign = center
    valign = center
    # Cinematic Shadow/Glow
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
    shadow_boost = 1.2
}

# PSWD PROMPT
input-field {
    monitor =
    size = 500, 100
    outline_thickness = 4
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    fade_on_empty = true
    rounding = -1
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    check_color = $cheak_color
    placeholder_text = Password...
    hide_input = false
    font_family = Klee One SemiBold
    position = 0, -250
    halign = center
    valign = center
}
