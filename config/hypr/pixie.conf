# Hyprland Configuration for Pixie Overlay
# Add these lines to your ~/.config/hypr/hyprland.conf

windowrule {
  name = pixie-overlay
  match:class = ^(pixie-overlay)$

  fullscreen = on
  float = on
  border_size = 0
  decorate = on
  no_focus = on
  no_initial_focus = on
  no_anim = on
  no_shadow = on
  no_blur = on
  no_dim = on
  no_follow_mouse = on
  no_shortcuts_inhibit = on
  opacity = 1.0 override 1.0 override 1.0 override

}

