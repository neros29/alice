#
# # No transparency on media windows
# windowrule = opacity 1 1, class:^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$
#
# # Popped window rounding
# windowrule = rounding 8, tag:pop

# new syntax
# Floating windows
windowrule = match:tag floating-window, float on
windowrule = match:tag floating-window, center 1
windowrule = match:tag floating-window, size 875 600

# Tag apps as floating-window
windowrule = match:class (blueberry\.py|com\.omarchy\.Impala|com\.omarchy\.Wiremix|com\.omarchy\.Omarchy|org\.gnome\.NautilusPreviewer|com\.gabm\.satty|Omarchy|About|TUI\.float), tag +floating-window

# File dialogs / open-save dialogs -> tag as floating-window
windowrule = match:class (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org\.gnome\.Nautilus), match:title ^(Open.*Files?|Open [Ff]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to (open|save).*|[Cc]hoose.*), tag +floating-window

# Calculator floats
windowrule = match:class org\.gnome\.Calculator, float on

# Fullscreen screensaver
windowrule = match:class Screensaver, fullscreen 1

# No transparency on media windows
windowrule = match:class ^(zoom|vlc|mpv|org\.kde\.kdenlive|com\.obsproject\.Studio|com\.github\.PintaProject\.Pinta|imv|org\.gnome\.NautilusPreviewer)$, opacity 1 1

# Popped window rounding
windowrule = match:tag pop, rounding 8
