# # Browser types
# windowrule = tag +chromium-based-browser, class:((google-)?[cC]hrom(e|ium)|[bB]rave-browser|Microsoft-edge|Vivaldi-stable|helium)
# windowrule = tag +firefox-based-browser, class:([fF]irefox|zen|librewolf)
#
# # Force chromium-based browsers into a tile to deal with --app bug
# windowrule = tile, tag:chromium-based-browser
#
# # Only a subtle opacity change, but not for video sites
# windowrule = opacity 1 0.97, tag:chromium-based-browser
# windowrule = opacity 1 0.97, tag:firefox-based-browser
#
# # Some video sites should never have opacity applied to them
# windowrule = opacity 1.0 1.0, initialTitle:((?i)(?:[a-z0-9-]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home)
# Browser types
windowrule = match:class ((google-)?[cC]hrom(e|ium)|[bB]rave-browser|Microsoft-edge|Vivaldi-stable|helium), tag +chromium-based-browser
windowrule = match:class ([fF]irefox|zen|librewolf), tag +firefox-based-browser

# Force chromium-based browsers into a tile to deal with --app bug
windowrule = match:tag chromium-based-browser, tile on

# Only a subtle opacity change
windowrule = match:tag chromium-based-browser, opacity 1 0.97
windowrule = match:tag firefox-based-browser, opacity 1 0.97

# Some video sites should never have opacity applied to them
windowrule = match:initial_title ((?i)(?:[a-z0-9-]+\.)*youtube\.com_/|app\.zoom\.us_/wc/home), opacity 1.0 1.0
